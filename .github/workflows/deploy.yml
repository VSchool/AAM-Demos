name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build React tracker
      - name: Build React tracker
        working-directory: demos/react-tracker
        run: npm ci && npm run build

      # Build Vue tracker
      - name: Build Vue tracker
        working-directory: demos/vue-tracker
        run: npm ci && npm run build

      # Build Next.js tracker
      - name: Build Next.js tracker
        working-directory: demos/nextjs-tracker
        run: npm ci && npm run build

      # Build Search Filter (W5D2S2)
      - name: Build Search Filter
        working-directory: demos/search-filter
        run: npm ci && npm run build

      # Build Router Explorer (W5D2S3)
      - name: Build Router Explorer
        working-directory: demos/router-explorer
        run: npm ci && npm run build

      # Build Blog Reader (W5D2S3)
      - name: Build Blog Reader
        working-directory: demos/blog-reader
        run: npm ci && npm run build

      # Build Next.js Bookshelf (W5D3S2)
      - name: Build Next.js Bookshelf
        working-directory: demos/nextjs-bookshelf
        run: npm ci && npm run build

      # Build Next.js Polish Demo (W5D3S3)
      - name: Build Next.js Polish Demo
        working-directory: demos/nextjs-polish-demo
        run: npm ci && npm run build

      # Assemble output
      - name: Assemble Pages output
        run: |
          mkdir -p _site
          cp demos/landing.html _site/index.html
          cp -r demos/react-tracker/dist _site/react-tracker
          cp -r demos/vue-tracker/dist _site/vue-tracker
          cp -r demos/nextjs-tracker/out _site/nextjs-tracker
          # Static demos (no build needed)
          cp -r demos/single-page-demo _site/single-page-demo
          cp -r demos/multi-page-demo _site/multi-page-demo
          cp -r demos/multi-page-full-demo _site/multi-page-full-demo
          cp -r demos/w4-polish-comparison _site/w4-polish-comparison
          cp -r demos/w4-example-capstone _site/w4-example-capstone
          # W5D2 React demos
          cp -r demos/search-filter/dist _site/search-filter
          cp -r demos/router-explorer/dist _site/router-explorer
          cp -r demos/blog-reader/dist _site/blog-reader
          # W5D3 Next.js demos
          cp -r demos/nextjs-bookshelf/out _site/nextjs-bookshelf
          cp -r demos/nextjs-polish-demo/out _site/nextjs-polish-demo
          # W5D4 Vue demos (static HTML, no build needed)
          cp -r demos/vue-component-tree _site/vue-component-tree
          cp -r demos/vue-forms _site/vue-forms
          cp -r demos/vue-router-explorer _site/vue-router-explorer
          cp -r demos/vue-routing-app _site/vue-routing-app
          cp -r demos/vue-bookshelf _site/vue-bookshelf

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
