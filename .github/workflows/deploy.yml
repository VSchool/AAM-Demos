name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Build React tracker
      - name: Build React tracker
        working-directory: demos/react-tracker
        run: npm ci && npm run build

      # Build Vue tracker
      - name: Build Vue tracker
        working-directory: demos/vue-tracker
        run: npm ci && npm run build

      # Build Next.js tracker
      - name: Build Next.js tracker
        working-directory: demos/nextjs-tracker
        run: npm ci && npm run build

      # Build Search Filter (W5D2S2)
      - name: Build Search Filter
        working-directory: demos/search-filter
        run: npm ci && npm run build

      # Build Router Explorer (W5D2S3)
      - name: Build Router Explorer
        working-directory: demos/router-explorer
        run: npm ci && npm run build

      # Build Blog Reader (W5D2S3)
      - name: Build Blog Reader
        working-directory: demos/blog-reader
        run: npm ci && npm run build

      # Build Next.js Bookshelf (W5D3S2)
      - name: Build Next.js Bookshelf
        working-directory: demos/nextjs-bookshelf
        run: npm ci && npm run build

      # Build Next.js Polish Demo (W5D3S3)
      - name: Build Next.js Polish Demo
        working-directory: demos/nextjs-polish-demo
        run: npm ci && npm run build

      # Build React Bakery Static (W5D1S2)
      - name: Build React Bakery Static
        working-directory: demos/react-bakery-static
        run: npm ci && npm run build

      # Build React Bakery Interactive (W5D1S2)
      - name: Build React Bakery Interactive
        working-directory: demos/react-bakery-interactive
        run: npm ci && npm run build

      # Build React Bakery Conditional (W5D1S3)
      - name: Build React Bakery Conditional
        working-directory: demos/react-bakery-conditional
        run: npm ci && npm run build

      # Build React Bakery Four States (W5D1S3)
      - name: Build React Bakery Four States
        working-directory: demos/react-bakery-four-states
        run: npm ci && npm run build

      # Build React Read Explain (W5D1S2)
      - name: Build React Read Explain
        working-directory: demos/react-read-explain
        run: npm ci && npm run build

      # Build React Component Tree (W5D1S2)
      - name: Build React Component Tree
        working-directory: demos/react-component-tree
        run: npm ci && npm run build

      # Build Astro Content Page (W5D2S1)
      - name: Build Astro Content Page
        working-directory: demos/astro-content-page
        run: npm ci && npm run build

      # Build Astro Scaffold Demo (W5D2S1)
      - name: Build Astro Scaffold Demo
        working-directory: demos/astro-scaffold-demo
        run: npm ci && npm run build

      # Build Astro Blog (W5D2S2)
      - name: Build Astro Blog
        working-directory: demos/astro-blog
        run: npm ci && npm run build

      # Build Astro Island Demo (W5D2S2)
      - name: Build Astro Island Demo
        working-directory: demos/astro-island
        run: npm ci && npm run build

      # Build React SPA Lighthouse (W5D2S3)
      - name: Build React SPA Lighthouse
        working-directory: demos/react-spa-lighthouse
        run: npm ci && npm run build

      # Build Astro Lighthouse (W5D2S3)
      - name: Build Astro Lighthouse
        working-directory: demos/astro-lighthouse
        run: npm ci && npm run build

      # Build Astro Island Highlight (W5D2S1 — Island Architecture lesson)
      - name: Build Astro Island Highlight
        working-directory: demos/astro-island-highlight
        run: npm ci && npm run build

      - name: Build Astro Event Listing v0
        working-directory: demos/astro-event-listing-v0
        run: npm ci && npm run build

      - name: Build Astro Event Listing v1
        working-directory: demos/astro-event-listing-v1
        run: npm ci && npm run build

      - name: Build Astro Event Listing v2
        working-directory: demos/astro-event-listing-v2
        run: npm ci && npm run build

      - name: Build Astro Event Listing v3
        working-directory: demos/astro-event-listing-v3
        run: npm ci && npm run build

      - name: Build Astro Event Listing v4
        working-directory: demos/astro-event-listing-v4
        run: npm ci && npm run build

      # W5D3 progressive nextjs-task-board series (Cadence UI kit)
      - name: Build Next.js Task Board v0
        working-directory: demos/nextjs-task-board-v0
        run: npm ci && npm run build

      - name: Build Next.js Task Board v1
        working-directory: demos/nextjs-task-board-v1
        run: npm ci && npm run build

      - name: Build Next.js Task Board v2
        working-directory: demos/nextjs-task-board-v2
        run: npm ci && npm run build

      - name: Build Next.js Task Board v3
        working-directory: demos/nextjs-task-board-v3
        run: npm ci && npm run build

      - name: Build Next.js Task Board v4
        working-directory: demos/nextjs-task-board-v4
        run: npm ci && npm run build

      - name: Build Next.js Task Board v5
        working-directory: demos/nextjs-task-board-v5
        run: npm ci && npm run build

      - name: Build Next.js Task Board v6
        working-directory: demos/nextjs-task-board-v6
        run: npm ci && npm run build

      # W5D4 Expo habit-tracker (Pulse) progressive series
      - name: Build Pulse (expo-habit-tracker v0)
        working-directory: demos/expo-habit-tracker-v0
        run: npm ci && npx expo export -p web

      - name: Build Pulse (expo-habit-tracker v1)
        working-directory: demos/expo-habit-tracker-v1
        run: npm ci && npx expo export -p web

      - name: Build Pulse (expo-habit-tracker v2)
        working-directory: demos/expo-habit-tracker-v2
        run: npm ci && npx expo export -p web

      # Assemble output
      - name: Assemble Pages output
        run: |
          mkdir -p _site
          cp demos/landing.html _site/index.html
          cp -r demos/react-tracker/dist _site/react-tracker
          cp -r demos/vue-tracker/dist _site/vue-tracker
          cp -r demos/nextjs-tracker/out _site/nextjs-tracker
          # Static demos (no build needed)
          cp -r demos/single-page-demo _site/single-page-demo
          cp -r demos/multi-page-demo _site/multi-page-demo
          cp -r demos/multi-page-full-demo _site/multi-page-full-demo
          cp -r demos/w4-polish-comparison _site/w4-polish-comparison
          cp -r demos/w4-example-capstone _site/w4-example-capstone
          # W5D2 React demos
          cp -r demos/search-filter/dist _site/search-filter
          cp -r demos/router-explorer/dist _site/router-explorer
          cp -r demos/blog-reader/dist _site/blog-reader
          # W5D3 Next.js demos
          cp -r demos/nextjs-bookshelf/out _site/nextjs-bookshelf
          cp -r demos/nextjs-polish-demo/out _site/nextjs-polish-demo
          # W5D4 Vue demos (static HTML, no build needed)
          cp -r demos/vue-component-tree _site/vue-component-tree
          cp -r demos/vue-forms _site/vue-forms
          cp -r demos/vue-router-explorer _site/vue-router-explorer
          cp -r demos/vue-routing-app _site/vue-routing-app
          cp -r demos/vue-bookshelf _site/vue-bookshelf
          # W5D1 React bakery progression + read-explain
          cp -r demos/react-bakery-static/dist _site/react-bakery-static
          cp -r demos/react-bakery-interactive/dist _site/react-bakery-interactive
          cp -r demos/react-bakery-conditional/dist _site/react-bakery-conditional
          cp -r demos/react-bakery-four-states/dist _site/react-bakery-four-states
          cp -r demos/react-read-explain/dist _site/react-read-explain
          cp -r demos/react-component-tree/dist _site/react-component-tree
          # W5D2S3 Lighthouse comparison pair
          cp -r demos/react-spa-lighthouse/dist _site/react-spa-lighthouse
          cp -r demos/astro-lighthouse/dist _site/astro-lighthouse
          # W5D2S1 Island Architecture (highlighted islands)
          cp -r demos/astro-island-highlight/dist _site/astro-island-highlight
          # W5D2 progressive event-listing series (Astro lane)
          cp -r demos/astro-event-listing-v0/dist _site/astro-event-listing-v0
          cp -r demos/astro-event-listing-v1/dist _site/astro-event-listing-v1
          cp -r demos/astro-event-listing-v2/dist _site/astro-event-listing-v2
          cp -r demos/astro-event-listing-v3/dist _site/astro-event-listing-v3
          cp -r demos/astro-event-listing-v4/dist _site/astro-event-listing-v4
          # W5D3 progressive nextjs-task-board series (Cadence UI kit)
          cp -r demos/nextjs-task-board-v0/out _site/nextjs-task-board-v0
          cp -r demos/nextjs-task-board-v1/out _site/nextjs-task-board-v1
          cp -r demos/nextjs-task-board-v2/out _site/nextjs-task-board-v2
          cp -r demos/nextjs-task-board-v3/out _site/nextjs-task-board-v3
          cp -r demos/nextjs-task-board-v4/out _site/nextjs-task-board-v4
          cp -r demos/nextjs-task-board-v5/out _site/nextjs-task-board-v5
          cp -r demos/nextjs-task-board-v6/out _site/nextjs-task-board-v6
          # W5D4 Expo habit-tracker (Pulse) — expo web export lands in dist/
          cp -r demos/expo-habit-tracker-v0/dist _site/expo-habit-tracker-v0
          cp -r demos/expo-habit-tracker-v1/dist _site/expo-habit-tracker-v1
          cp -r demos/expo-habit-tracker-v2/dist _site/expo-habit-tracker-v2

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
