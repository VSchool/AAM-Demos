name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build React tracker
      - name: Build React tracker
        working-directory: demos/react-tracker
        run: npm ci && npm run build

      # Build Vue tracker
      - name: Build Vue tracker
        working-directory: demos/vue-tracker
        run: npm ci && npm run build

      # Build Next.js tracker
      - name: Build Next.js tracker
        working-directory: demos/nextjs-tracker
        run: npm ci && npm run build

      # Assemble output
      - name: Assemble Pages output
        run: |
          mkdir -p _site
          cp demos/landing.html _site/index.html
          cp -r demos/react-tracker/dist _site/react-tracker
          cp -r demos/vue-tracker/dist _site/vue-tracker
          cp -r demos/nextjs-tracker/out _site/nextjs-tracker
          # W4D3 static demos (no build needed)
          cp -r demos/single-page-demo _site/single-page-demo
          cp -r demos/multi-page-demo _site/multi-page-demo
          cp -r demos/multi-page-full-demo _site/multi-page-full-demo
          # W4D5 static demos
          cp -r demos/w4-polish-comparison _site/w4-polish-comparison
          cp -r demos/w4-example-capstone _site/w4-example-capstone

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
