<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookshelf — Vue 3 Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600&display=swap" rel="stylesheet">
  <style>
/* ===== Next.js Bookshelf Demo — Global Styles ===== */
/* Professional redesign — editorial / literary aesthetic */

:root {
  /* Palette — warm dark editorial */
  --bg-primary: #0C0A09;
  --bg-secondary: #1C1917;
  --bg-card: #1C1917;
  --bg-card-hover: #292524;
  --bg-elevated: #292524;
  --accent: #D4A574;
  --accent-hover: #C49464;
  --accent-light: rgba(212, 165, 116, 0.12);
  --accent-glow: rgba(212, 165, 116, 0.25);
  --secondary: #A78BFA;
  --text-primary: #FAFAF9;
  --text-secondary: #A8A29E;
  --text-muted: #78716C;
  --success: #4ADE80;
  --warning: #FBBF24;
  --border-subtle: rgba(168, 162, 158, 0.08);
  --border-card: rgba(168, 162, 158, 0.1);

  /* Shadows */
  --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.3), 0 4px 20px rgba(0, 0, 0, 0.2);
  --shadow-card-hover: 0 8px 40px rgba(0, 0, 0, 0.4), 0 2px 12px rgba(212, 165, 116, 0.08);
  --shadow-button: 0 2px 8px rgba(212, 165, 116, 0.3);
  --shadow-hero: 0 20px 60px rgba(0, 0, 0, 0.5);

  /* Radii */
  --radius-card: 16px;
  --radius-button: 10px;
  --radius-pill: 100px;

  /* Spacing */
  --gap-cards: 1.75rem;
  --padding-card: 1.5rem;
  --max-width: 1200px;
  --section-gap: 4rem;

  /* Typography */
  --font-serif: 'Playfair Display', Georgia, 'Times New Roman', serif;
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

/* ===== Reset ===== */
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-sans);
  background-color: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

a {
  color: inherit;
  text-decoration: none;
}

img {
  max-width: 100%;
  display: block;
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
}

input {
  font-family: inherit;
}

/* ===== Typography ===== */
h1, h2, h3, h4 {
  font-family: var(--font-serif);
  font-weight: 700;
  line-height: 1.15;
  color: var(--text-primary);
}

h1 {
  font-size: 3.25rem;
  letter-spacing: -0.02em;
}

h2 {
  font-size: 2.25rem;
  letter-spacing: -0.01em;
}

h3 {
  font-size: 1.35rem;
  font-weight: 600;
}

p {
  color: var(--text-secondary);
  line-height: 1.7;
}

/* ===== Layout ===== */
.page-container {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 4rem 2rem 6rem;
  flex: 1;
}

/* ===== Navigation ===== */
.nav {
  background: rgba(12, 10, 9, 0.6);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--border-subtle);
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  transition: background 0.3s ease;
}

.nav-inner {
  max-width: var(--max-width);
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2rem;
  height: 64px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: 1.3rem;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}

.nav-logo-icon {
  font-size: 1.25rem;
}

.nav-logo span {
  color: var(--text-primary);
  background: none;
  -webkit-background-clip: unset;
  -webkit-text-fill-color: unset;
  background-clip: unset;
}

.nav-links {
  display: flex;
  gap: 0.25rem;
  list-style: none;
}

.nav-link {
  display: block;
  padding: 0.5rem 1rem;
  border-radius: var(--radius-pill);
  color: var(--text-muted);
  font-weight: 500;
  font-size: 0.875rem;
  letter-spacing: 0.02em;
  transition: color 0.2s, background 0.2s;
}

.nav-link:hover {
  color: var(--text-primary);
  background: rgba(255, 255, 255, 0.06);
}

.nav-link.active {
  color: var(--accent);
  background: var(--accent-light);
}

/* ===== Hero Banner ===== */
.hero-banner {
  position: relative;
  width: 100%;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.hero-banner-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
  filter: brightness(0.5) saturate(0.7);
}

.hero-banner-overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(
      to bottom,
      rgba(12, 10, 9, 0.3) 0%,
      rgba(12, 10, 9, 0.2) 30%,
      rgba(12, 10, 9, 0.6) 65%,
      rgba(12, 10, 9, 0.95) 85%,
      rgba(12, 10, 9, 1) 100%
    );
  z-index: 1;
}

.hero-banner-content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 6rem 2rem 4rem;
  max-width: 800px;
}

.hero-eyebrow {
  display: inline-block;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 1.5rem;
  position: relative;
}

.hero-eyebrow::before,
.hero-eyebrow::after {
  content: "";
  display: inline-block;
  width: 2rem;
  height: 1px;
  background: var(--accent);
  vertical-align: middle;
  opacity: 0.5;
}

.hero-eyebrow::before {
  margin-right: 1rem;
}

.hero-eyebrow::after {
  margin-left: 1rem;
}

.hero-banner-content h1 {
  font-family: var(--font-serif);
  font-size: 4.5rem;
  font-weight: 800;
  margin-bottom: 1.5rem;
  letter-spacing: -0.03em;
  line-height: 1.05;
  color: var(--text-primary);
}

.hero-banner-content h1 .accent {
  color: var(--accent);
  font-style: italic;
  background: none;
  -webkit-background-clip: unset;
  -webkit-text-fill-color: unset;
  background-clip: unset;
}

.hero-banner-content p {
  font-size: 1.2rem;
  max-width: 540px;
  margin: 0 auto 3rem;
  color: rgba(250, 250, 249, 0.65);
  line-height: 1.8;
  font-weight: 300;
}

.hero-cta {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--accent);
  color: var(--bg-primary);
  padding: 1rem 2.5rem;
  border-radius: var(--radius-pill);
  font-weight: 600;
  font-size: 0.95rem;
  letter-spacing: 0.03em;
  box-shadow: var(--shadow-button);
  transition: all 0.3s ease;
}

.hero-cta:hover {
  background: var(--accent-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(212, 165, 116, 0.35);
}

/* ===== Section Headers ===== */
.section-label {
  display: block;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.75rem;
}

.section-header {
  margin-bottom: 3rem;
}

.section-header h2 {
  margin-bottom: 0.5rem;
}

.section-header p {
  font-size: 1.05rem;
  color: var(--text-muted);
  max-width: 480px;
}

/* ===== Featured Section ===== */
.featured-section {
  padding: 5rem 0;
}

.featured-divider {
  width: 3rem;
  height: 2px;
  background: var(--accent);
  margin-bottom: 1rem;
  opacity: 0.6;
}

/* ===== Book Grid ===== */
.book-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: var(--gap-cards);
}

/* ===== Book Card ===== */
.book-card {
  background: var(--bg-card);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  overflow: hidden;
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
              box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border-card);
}

.book-card:hover {
  transform: translateY(-8px);
  box-shadow: var(--shadow-card-hover);
}

.book-card-cover {
  height: 220px;
  position: relative;
  overflow: hidden;
}

.book-card-cover-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.book-card:hover .book-card-cover-img {
  transform: scale(1.05);
}

.book-card-cover-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to top,
    rgba(12, 10, 9, 0.5) 0%,
    rgba(12, 10, 9, 0) 50%
  );
  z-index: 1;
}

.book-card-category {
  position: absolute;
  top: 1rem;
  left: 1rem;
  z-index: 2;
  display: inline-block;
  background: rgba(12, 10, 9, 0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--accent);
  font-size: 0.65rem;
  font-weight: 600;
  padding: 0.3rem 0.75rem;
  border-radius: var(--radius-pill);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: 1px solid rgba(212, 165, 116, 0.15);
}

.book-card-body {
  padding: 1.5rem;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.book-card-title {
  font-family: var(--font-serif);
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 0.3rem;
  line-height: 1.3;
}

.book-card-author {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 0.85rem;
  font-style: italic;
}

.book-card-description {
  font-size: 0.875rem;
  color: var(--text-secondary);
  line-height: 1.65;
  flex: 1;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.book-card-footer {
  padding: 0 1.5rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.book-card-year {
  font-size: 0.8rem;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}

.book-card-link {
  font-size: 0.85rem;
  color: var(--accent);
  font-weight: 600;
  transition: color 0.2s, gap 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
}

.book-card-link:hover {
  color: var(--text-primary);
}

/* ===== Favorite Button ===== */
.favorite-btn {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.4rem 0.8rem;
  border-radius: var(--radius-pill);
  font-size: 0.85rem;
  font-weight: 500;
  transition: background 0.2s, color 0.2s, transform 0.15s;
  color: var(--text-muted);
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--border-subtle);
}

.favorite-btn:hover {
  background: rgba(212, 165, 116, 0.08);
  color: var(--accent);
  border-color: rgba(212, 165, 116, 0.2);
}

.favorite-btn.favorited {
  background: rgba(212, 165, 116, 0.12);
  color: var(--accent);
  border-color: rgba(212, 165, 116, 0.25);
}

.favorite-btn:active {
  transform: scale(0.95);
}

.favorite-btn-icon {
  font-size: 1rem;
  line-height: 1;
}

/* ===== Search Bar ===== */
.search-container {
  margin-bottom: 2.5rem;
}

.search-input {
  width: 100%;
  padding: 1rem 1.5rem;
  padding-left: 3.25rem;
  background: var(--bg-secondary);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-card);
  color: var(--text-primary);
  font-size: 1rem;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}

.search-input::placeholder {
  color: var(--text-muted);
}

.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}

.search-wrapper {
  position: relative;
}

.search-icon {
  position: absolute;
  left: 1.25rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 1rem;
  pointer-events: none;
}

/* ===== Book Detail Page ===== */
.book-detail {
  max-width: 900px;
  margin: 0 auto;
}

.book-detail-header {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3.5rem;
  margin-bottom: 3rem;
  align-items: start;
}

.book-detail-cover {
  width: 100%;
  aspect-ratio: 4 / 3;
  border-radius: var(--radius-card);
  overflow: hidden;
  flex-shrink: 0;
  box-shadow: var(--shadow-hero);
}

.book-detail-cover-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.book-detail-info {
  padding-top: 0.5rem;
}

.book-detail-info h1 {
  font-family: var(--font-serif);
  font-size: 2.5rem;
  margin-bottom: 0.5rem;
  line-height: 1.15;
}

.book-detail-author {
  font-size: 1.1rem;
  color: var(--text-secondary);
  margin-bottom: 1.5rem;
  font-style: italic;
}

.book-detail-meta {
  display: flex;
  gap: 0.75rem;
  margin-bottom: 2rem;
  flex-wrap: wrap;
}

.book-detail-tag {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.4rem 1rem;
  border-radius: var(--radius-pill);
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.03em;
}

.book-detail-tag.category {
  background: var(--accent-light);
  color: var(--accent);
  border: 1px solid rgba(212, 165, 116, 0.2);
}

.book-detail-tag.year {
  background: rgba(74, 222, 128, 0.1);
  color: var(--success);
  border: 1px solid rgba(74, 222, 128, 0.15);
}

.book-detail-description {
  font-size: 1.1rem;
  line-height: 1.85;
  color: var(--text-secondary);
  margin-bottom: 2.5rem;
}

.book-detail-actions {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  color: var(--text-muted);
  font-weight: 500;
  font-size: 0.9rem;
  margin-bottom: 2.5rem;
  transition: color 0.2s;
  letter-spacing: 0.01em;
}

.back-link:hover {
  color: var(--accent);
}

/* ===== Featured Books (home page) ===== */
.featured-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: var(--gap-cards);
  margin-bottom: 3.5rem;
}

/* ===== Browse CTA ===== */
.browse-cta-wrapper {
  text-align: center;
  padding-top: 1rem;
}

/* ===== Featured Quote / Callout ===== */
.featured-callout {
  position: relative;
  margin: var(--section-gap) 0;
  padding: 5rem 3rem;
  border-radius: var(--radius-card);
  overflow: hidden;
  text-align: center;
}

.featured-callout-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.3) saturate(0.6);
}

.featured-callout-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    135deg,
    rgba(12, 10, 9, 0.85) 0%,
    rgba(28, 25, 23, 0.75) 100%
  );
}

.featured-callout-content {
  position: relative;
  z-index: 2;
  max-width: 600px;
  margin: 0 auto;
}

.featured-callout-content blockquote {
  font-family: var(--font-serif);
  font-size: 1.6rem;
  font-style: italic;
  line-height: 1.6;
  color: var(--text-primary);
  margin-bottom: 1rem;
}

.featured-callout-content cite {
  font-size: 0.9rem;
  color: var(--accent);
  font-style: normal;
  font-weight: 500;
}

/* ===== Favorites Page ===== */
.favorites-empty {
  text-align: center;
  padding: 5rem 2rem;
  max-width: 420px;
  margin: 0 auto;
}

.favorites-empty-icon {
  font-size: 3.5rem;
  margin-bottom: 1.5rem;
  opacity: 0.4;
}

.favorites-empty h2 {
  margin-bottom: 0.75rem;
  font-size: 1.75rem;
}

.favorites-empty p {
  margin-bottom: 2.5rem;
  line-height: 1.7;
}

.favorites-cta {
  display: inline-block;
  background: var(--accent);
  color: var(--bg-primary);
  padding: 0.75rem 2rem;
  border-radius: var(--radius-pill);
  font-weight: 600;
  font-size: 0.9rem;
  box-shadow: var(--shadow-button);
  transition: all 0.25s ease;
  letter-spacing: 0.02em;
}

.favorites-cta:hover {
  background: var(--accent-hover);
  transform: translateY(-2px);
}

/* ===== Component Label ===== */
.component-label {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-top: 4rem;
  padding: 0.85rem 1.25rem;
  background: rgba(255, 255, 255, 0.03);
  border-radius: var(--radius-button);
  font-size: 0.78rem;
  color: var(--text-muted);
  border: 1px solid var(--border-subtle);
}

.component-label-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.component-label-dot.server {
  background: var(--success);
}

.component-label-dot.client {
  background: var(--secondary);
}

.component-label strong {
  color: var(--text-secondary);
  font-weight: 600;
}

/* ===== Footer ===== */
.site-footer {
  background: var(--bg-secondary);
  margin-top: auto;
  padding: 2.5rem 2rem;
  text-align: center;
  font-size: 0.85rem;
  color: var(--text-muted);
  border-top: 1px solid var(--border-subtle);
}

.site-footer a {
  color: var(--accent);
  font-weight: 500;
  transition: color 0.2s;
}

.site-footer a:hover {
  color: var(--text-primary);
}

/* ===== No Results ===== */
.no-results {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--text-muted);
}

.no-results-icon {
  font-size: 2.5rem;
  margin-bottom: 1rem;
  opacity: 0.4;
}

/* ===== Stats Row ===== */
.stats-row {
  display: flex;
  justify-content: center;
  gap: 4rem;
  padding: 3rem 0;
  border-top: 1px solid var(--border-subtle);
  border-bottom: 1px solid var(--border-subtle);
  margin: var(--section-gap) 0;
}

.stat-item {
  text-align: center;
}

.stat-number {
  font-family: var(--font-serif);
  font-size: 2.5rem;
  font-weight: 700;
  color: var(--accent);
  display: block;
  line-height: 1;
  margin-bottom: 0.5rem;
}

.stat-label {
  font-size: 0.8rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 500;
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  h1 {
    font-size: 2rem;
  }

  h2 {
    font-size: 1.75rem;
  }

  .hero-banner {
    min-height: 85vh;
  }

  .hero-banner-content {
    padding: 4rem 1.5rem 3rem;
  }

  .hero-banner-content h1 {
    font-size: 2.75rem;
  }

  .hero-banner-content p {
    font-size: 1.05rem;
  }

  .page-container {
    padding: 3rem 1.25rem 4rem;
  }

  .book-detail-header {
    grid-template-columns: 1fr;
    gap: 2rem;
  }

  .book-detail-cover {
    max-width: 400px;
    margin: 0 auto;
  }

  .book-detail-info {
    text-align: center;
  }

  .book-detail-info h1 {
    font-size: 2rem;
  }

  .book-detail-meta {
    justify-content: center;
  }

  .book-detail-actions {
    justify-content: center;
  }

  .nav-inner {
    padding: 0 1rem;
  }

  .nav-link {
    padding: 0.4rem 0.65rem;
    font-size: 0.8rem;
  }

  .stats-row {
    gap: 2rem;
    flex-wrap: wrap;
  }

  .stat-number {
    font-size: 2rem;
  }

  .featured-callout {
    padding: 3.5rem 2rem;
    margin: 3rem 0;
  }

  .featured-callout-content blockquote {
    font-size: 1.25rem;
  }

  .section-header {
    margin-bottom: 2rem;
  }
}

@media (max-width: 480px) {
  .book-grid,
  .featured-grid {
    grid-template-columns: 1fr;
  }

  .hero-banner-content h1 {
    font-size: 2.25rem;
  }

  .stats-row {
    gap: 1.5rem;
  }
}
  </style>
</head>
<body>

  <div id="app"></div>

  <!-- Vue 3 + Vue Router 4 via CDN (no build step) -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>

  <script>
    const { createApp, ref, computed, reactive, watch, onMounted } = Vue;
    const { createRouter, createWebHashHistory, useRoute, useRouter, RouterLink, RouterView } = VueRouter;

    // =========================================================
    // DATA — Same 8 books from the Next.js version
    // =========================================================
    const books = [
      {
        id: "pragmatic-programmer",
        title: "The Pragmatic Programmer",
        author: "Andrew Hunt & David Thomas",
        description: "A timeless guide to software craftsmanship that covers everything from personal responsibility to architecture. It introduced concepts like DRY (Don't Repeat Yourself) and the Broken Window Theory to the programming world.",
        category: "Software Engineering",
        year: 1999,
        coverImage: "https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=600&h=400&fit=crop&q=80"
      },
      {
        id: "clean-code",
        title: "Clean Code",
        author: "Robert C. Martin",
        description: "A handbook of agile software craftsmanship focused on writing readable, maintainable code. Martin walks through real-world examples of messy code and demonstrates step-by-step how to refactor it into clean, professional-quality software.",
        category: "Software Engineering",
        year: 2008,
        coverImage: "https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=600&h=400&fit=crop&q=80"
      },
      {
        id: "designing-data-intensive-applications",
        title: "Designing Data-Intensive Applications",
        author: "Martin Kleppmann",
        description: "A deep dive into the architecture of systems that handle large volumes of data. Kleppmann covers databases, stream processing, and distributed systems with remarkable clarity, making complex infrastructure concepts accessible.",
        category: "Systems Design",
        year: 2017,
        coverImage: "https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=600&h=400&fit=crop&q=80"
      },
      {
        id: "you-dont-know-js",
        title: "You Don't Know JS",
        author: "Kyle Simpson",
        description: "A series that digs into the core mechanisms of JavaScript, covering scope, closures, prototypes, and async patterns. Simpson challenges developers to move beyond surface-level understanding and truly master the language.",
        category: "JavaScript",
        year: 2014,
        coverImage: "https://images.unsplash.com/photo-1627398242454-45a1465c2479?w=600&h=400&fit=crop&q=80"
      },
      {
        id: "refactoring",
        title: "Refactoring",
        author: "Martin Fowler",
        description: "The definitive guide to improving the design of existing code without changing its behavior. Fowler provides a catalog of refactoring techniques with clear motivations, mechanics, and examples for each transformation.",
        category: "Software Engineering",
        year: 2018,
        coverImage: "https://images.unsplash.com/photo-1504639725590-34d0984388bd?w=600&h=400&fit=crop&q=80"
      },
      {
        id: "system-design-interview",
        title: "System Design Interview",
        author: "Alex Xu",
        description: "A practical guide to tackling system design questions with a step-by-step framework. Each chapter walks through designing a real system like a rate limiter, URL shortener, or chat application from scratch.",
        category: "Systems Design",
        year: 2020,
        coverImage: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=600&h=400&fit=crop&q=80"
      },
      {
        id: "eloquent-javascript",
        title: "Eloquent JavaScript",
        author: "Marijn Haverbeke",
        description: "A modern introduction to programming through JavaScript that balances fundamentals with practical projects. The book includes interactive exercises and builds real applications like a pixel art editor and a platform game.",
        category: "JavaScript",
        year: 2018,
        coverImage: "https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=600&h=400&fit=crop&q=80"
      },
      {
        id: "art-of-readable-code",
        title: "The Art of Readable Code",
        author: "Dustin Boswell & Trevor Fouler",
        description: "A concise guide focused on the single most important aspect of code quality: readability. The authors provide practical techniques for naming, commenting, and structuring code so that other developers can understand it quickly.",
        category: "Software Engineering",
        year: 2011,
        coverImage: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=600&h=400&fit=crop&q=80"
      }
    ];

    // Helper functions
    function getBookById(id) {
      return books.find(book => book.id === id);
    }

    // Derive stats
    const categories = new Set(books.map(b => b.category));
    const earliestYear = Math.min(...books.map(b => b.year));
    const latestYear = Math.max(...books.map(b => b.year));

    // =========================================================
    // COMPOSABLE: useFavorites()
    // =========================================================
    const favoritesState = reactive({
      ids: JSON.parse(localStorage.getItem('bookshelf-favorites') || '[]')
    });

    watch(
      () => [...favoritesState.ids],
      (newIds) => {
        localStorage.setItem('bookshelf-favorites', JSON.stringify(newIds));
      },
      { deep: true }
    );

    function useFavorites() {
      const favoriteIds = computed(() => favoritesState.ids);

      const favoriteBooks = computed(() =>
        books.filter(b => favoritesState.ids.includes(b.id))
      );

      const favoriteCount = computed(() => favoritesState.ids.length);

      function isFavorite(bookId) {
        return favoritesState.ids.includes(bookId);
      }

      function toggleFavorite(bookId) {
        const idx = favoritesState.ids.indexOf(bookId);
        if (idx > -1) {
          favoritesState.ids.splice(idx, 1);
        } else {
          favoritesState.ids.push(bookId);
        }
      }

      return { favoriteIds, favoriteBooks, favoriteCount, isFavorite, toggleFavorite };
    }

    // =========================================================
    // COMPONENT: FavoriteButton
    // =========================================================
    const FavoriteButton = {
      props: {
        bookId: { type: String, required: true }
      },
      setup(props) {
        const { isFavorite, toggleFavorite } = useFavorites();
        const favorited = computed(() => isFavorite(props.bookId));

        function toggle() {
          toggleFavorite(props.bookId);
        }

        return { favorited, toggle };
      },
      template: `
        <button
          class="favorite-btn"
          :class="{ favorited: favorited }"
          @click.prevent.stop="toggle"
          :aria-label="favorited ? 'Remove from favorites' : 'Add to favorites'"
        >
          <span class="favorite-btn-icon">{{ favorited ? '\u2665' : '\u2661' }}</span>
          <span>{{ favorited ? 'Saved' : 'Save' }}</span>
        </button>
      `
    };

    // =========================================================
    // COMPONENT: BookCard
    // =========================================================
    const BookCard = {
      components: { FavoriteButton },
      props: {
        book: { type: Object, required: true }
      },
      template: `
        <div class="book-card">
          <div class="book-card-cover">
            <img
              :src="book.coverImage"
              :alt="book.title"
              loading="lazy"
              class="book-card-cover-img"
            />
            <div class="book-card-cover-overlay"></div>
            <span class="book-card-category">{{ book.category }}</span>
          </div>
          <div class="book-card-body">
            <h3 class="book-card-title">{{ book.title }}</h3>
            <p class="book-card-author">by {{ book.author }}</p>
            <p class="book-card-description">{{ book.description }}</p>
          </div>
          <div class="book-card-footer">
            <span class="book-card-year">{{ book.year }}</span>
            <div style="display: flex; gap: 0.75rem; align-items: center;">
              <favorite-button :book-id="book.id" />
              <router-link :to="'/books/' + book.id" class="book-card-link">
                Details &rarr;
              </router-link>
            </div>
          </div>
        </div>
      `
    };

    // =========================================================
    // COMPONENT: ComponentLabel
    // =========================================================
    const ComponentLabel = {
      props: {
        type: { type: String, default: 'reactive' },
        description: { type: String, required: true }
      },
      template: `
        <div class="component-label">
          <span class="component-label-dot" :class="type"></span>
          <span>
            <strong>Vue Component</strong>
            &mdash; {{ description }}
          </span>
        </div>
      `
    };

    // =========================================================
    // COMPONENT: Nav
    // =========================================================
    const AppNav = {
      setup() {
        const route = useRoute();
        const links = [
          { path: '/', label: 'Home' },
          { path: '/books', label: 'Collection' },
          { path: '/favorites', label: 'Favorites' }
        ];

        function isActive(linkPath) {
          if (linkPath === '/') {
            return route.path === '/';
          }
          return route.path.startsWith(linkPath);
        }

        return { links, isActive };
      },
      template: `
        <nav class="nav">
          <div class="nav-inner">
            <router-link to="/" class="nav-logo">
              <span class="nav-logo-icon">\uD83D\uDCD6</span>
              <span>Bookshelf</span>
            </router-link>
            <ul class="nav-links">
              <li v-for="link in links" :key="link.path">
                <router-link
                  :to="link.path"
                  class="nav-link"
                  :class="{ active: isActive(link.path) }"
                >
                  {{ link.label }}
                </router-link>
              </li>
            </ul>
          </div>
        </nav>
      `
    };

    // =========================================================
    // COMPONENT: Footer
    // =========================================================
    const AppFooter = {
      template: `
        <footer class="site-footer">
          <p>
            Built with
            <a href="https://vuejs.org" target="_blank" rel="noopener noreferrer">Vue.js</a>
            &mdash; AIM Curriculum Demo
          </p>
        </footer>
      `
    };

    // =========================================================
    // VIEW: Home
    // =========================================================
    const HomeView = {
      components: { BookCard, ComponentLabel },
      setup() {
        const featuredBooks = books.slice(0, 4);
        return {
          featuredBooks,
          totalBooks: books.length,
          totalCategories: categories.size,
          earliestYear,
          latestYear
        };
      },
      template: `
        <main>
          <section class="hero-banner">
            <img
              src="https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=1400&h=800&fit=crop&q=80"
              alt="Grand library interior with rows of illuminated bookshelves"
              class="hero-banner-bg"
              loading="eager"
            />
            <div class="hero-banner-overlay"></div>
            <div class="hero-banner-content">
              <span class="hero-eyebrow">Curated for Engineers</span>
              <h1>Build Your <span class="accent">Library</span></h1>
              <p>A carefully curated collection of the most influential programming books — the ones that change how you think about code.</p>
              <router-link to="/books" class="hero-cta">Explore the Collection</router-link>
            </div>
          </section>

          <div class="page-container">
            <div class="stats-row">
              <div class="stat-item">
                <span class="stat-number">{{ totalBooks }}</span>
                <span class="stat-label">Books</span>
              </div>
              <div class="stat-item">
                <span class="stat-number">{{ totalCategories }}</span>
                <span class="stat-label">Categories</span>
              </div>
              <div class="stat-item">
                <span class="stat-number">{{ earliestYear }}</span>
                <span class="stat-label">Earliest</span>
              </div>
              <div class="stat-item">
                <span class="stat-number">{{ latestYear }}</span>
                <span class="stat-label">Latest</span>
              </div>
            </div>

            <section class="featured-section">
              <div class="section-header">
                <span class="section-label">Handpicked</span>
                <h2>Featured Books</h2>
                <p>Classics every developer should read at least once</p>
              </div>
              <div class="featured-grid">
                <book-card v-for="book in featuredBooks" :key="book.id" :book="book" />
              </div>
              <div class="browse-cta-wrapper">
                <router-link to="/books" class="hero-cta">View All {{ totalBooks }} Books</router-link>
              </div>
            </section>

            <section class="featured-callout">
              <img
                src="https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=1400&h=600&fit=crop&q=80"
                alt="Warm library reading room with natural light"
                class="featured-callout-bg"
                loading="lazy"
              />
              <div class="featured-callout-overlay"></div>
              <div class="featured-callout-content">
                <blockquote>&ldquo;A reader lives a thousand lives before he dies. The man who never reads lives only one.&rdquo;</blockquote>
                <cite>George R.R. Martin</cite>
              </div>
            </section>

            <component-label
              type="server"
              description="reactive data computed at mount time, rendered by Vue"
            />
          </div>
        </main>
      `
    };

    // =========================================================
    // VIEW: Books (Collection with search)
    // =========================================================
    const BooksView = {
      components: { BookCard, ComponentLabel },
      setup() {
        const query = ref('');

        const filtered = computed(() => {
          const q = query.value.trim().toLowerCase();
          if (!q) return books;
          return books.filter(
            book =>
              book.title.toLowerCase().includes(q) ||
              book.author.toLowerCase().includes(q)
          );
        });

        return { query, filtered };
      },
      template: `
        <main class="page-container" style="padding-top: 7rem;">
          <div class="section-header">
            <span class="section-label">Full Collection</span>
            <h2>All Books</h2>
            <p>Browse the complete library — search by title or author</p>
          </div>

          <div class="search-container">
            <div class="search-wrapper">
              <span class="search-icon">\uD83D\uDD0D</span>
              <input
                type="text"
                class="search-input"
                placeholder="Search by title or author..."
                v-model="query"
              />
            </div>
          </div>

          <div v-if="filtered.length > 0" class="book-grid">
            <book-card v-for="book in filtered" :key="book.id" :book="book" />
          </div>
          <div v-else class="no-results">
            <div class="no-results-icon">\uD83D\uDCD6</div>
            <p>No books found matching &ldquo;{{ query }}&rdquo;</p>
          </div>

          <component-label
            type="client"
            description="uses v-model for reactive search filtering with computed properties"
          />
        </main>
      `
    };

    // =========================================================
    // VIEW: Book Detail
    // =========================================================
    const BookDetailView = {
      components: { FavoriteButton, ComponentLabel },
      setup() {
        const route = useRoute();
        const book = computed(() => getBookById(route.params.id));
        return { book };
      },
      template: `
        <main class="page-container" style="padding-top: 7rem;">
          <div v-if="book" class="book-detail">
            <router-link to="/books" class="back-link">
              &larr; Back to collection
            </router-link>

            <div class="book-detail-header">
              <div class="book-detail-cover">
                <img
                  :src="book.coverImage"
                  :alt="book.title"
                  loading="lazy"
                  class="book-detail-cover-img"
                />
              </div>

              <div class="book-detail-info">
                <div class="book-detail-meta">
                  <span class="book-detail-tag category">{{ book.category }}</span>
                  <span class="book-detail-tag year">{{ book.year }}</span>
                </div>

                <h1>{{ book.title }}</h1>
                <p class="book-detail-author">by {{ book.author }}</p>

                <p class="book-detail-description">{{ book.description }}</p>

                <div class="book-detail-actions">
                  <favorite-button :book-id="book.id" />
                </div>
              </div>
            </div>

            <component-label
              type="server"
              :description="'reactive route param — route: /books/' + book.id"
            />
          </div>

          <div v-else class="no-results">
            <div class="no-results-icon">\uD83D\uDCD6</div>
            <p>Book not found.</p>
            <router-link to="/books" class="hero-cta" style="margin-top: 1.5rem;">
              &larr; Back to collection
            </router-link>
          </div>
        </main>
      `
    };

    // =========================================================
    // VIEW: Favorites
    // =========================================================
    const FavoritesView = {
      components: { BookCard, ComponentLabel },
      setup() {
        const { favoriteBooks } = useFavorites();
        return { favoriteBooks };
      },
      template: `
        <main class="page-container" style="padding-top: 7rem;">
          <div class="section-header">
            <span class="section-label">Your Library</span>
            <h2>Favorites</h2>
            <p v-if="favoriteBooks.length > 0">
              You've saved {{ favoriteBooks.length }} book{{ favoriteBooks.length === 1 ? '' : 's' }}
            </p>
            <p v-else>Books you save will appear here</p>
          </div>

          <div v-if="favoriteBooks.length > 0" class="book-grid">
            <book-card v-for="book in favoriteBooks" :key="book.id" :book="book" />
          </div>

          <div v-else class="favorites-empty">
            <div class="favorites-empty-icon">\uD83D\uDCD6</div>
            <h2>No favorites yet</h2>
            <p>Click the heart icon on any book to save it to your favorites list. Your selections are stored in localStorage.</p>
            <router-link to="/books" class="favorites-cta">Browse Collection</router-link>
          </div>

          <component-label
            type="client"
            description="uses localStorage to persist favorites — no server required"
          />
        </main>
      `
    };

    // =========================================================
    // APP LAYOUT
    // =========================================================
    const AppLayout = {
      components: { AppNav, AppFooter },
      template: `
        <app-nav />
        <router-view />
        <app-footer />
      `
    };

    // =========================================================
    // ROUTER
    // =========================================================
    const routes = [
      {
        path: '/',
        component: AppLayout,
        children: [
          { path: '', name: 'home', component: HomeView },
          { path: 'books', name: 'books', component: BooksView },
          { path: 'books/:id', name: 'book-detail', component: BookDetailView },
          { path: 'favorites', name: 'favorites', component: FavoritesView }
        ]
      }
    ];

    const router = createRouter({
      history: createWebHashHistory(),
      routes,
      scrollBehavior(to, from, savedPosition) {
        return savedPosition || { top: 0 };
      }
    });

    // =========================================================
    // MOUNT
    // =========================================================
    const app = createApp({
      template: '<router-view />'
    });

    app.use(router);
    app.mount('#app');
  </script>
</body>
</html>
